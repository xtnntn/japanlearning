name: Build update release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-macos:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches app version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          APP_VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          test "${GITHUB_REF_NAME}" = "v${APP_VERSION}"

      - name: Build and publish signed updater artifacts
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          tagName: v__VERSION__
          releaseName: Kotoba Atelier v__VERSION__
          releaseBody: |
            Kotoba Atelier 自动更新版本。

            更新内容请查看应用内版本说明。
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
